<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录 / 注册 — 智育云</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- ===== 导航栏（简化版）===== -->
<nav class="navbar" id="navbar">
  <div class="container navbar-inner">
    <a href="index.html" class="navbar-brand">
      <div class="brand-logo">智</div>
      <div class="brand-name">
        <span class="brand-name-main">智育云</span>
        <span class="brand-name-sub">中学历史教学一站式数字化工具</span>
      </div>
    </a>
    <div style="flex:1;"></div>
    <div style="display:flex;gap:12px;align-items:center;">
      <a href="artifacts.html" style="color:rgba(245,240,232,0.55);font-size:0.845rem;transition:color 0.3s;" onmouseover="this.style.color='var(--gold-light)'" onmouseout="this.style.color='rgba(245,240,232,0.55)'">探索文物库</a>
      <a href="ai-tools.html" style="color:rgba(245,240,232,0.55);font-size:0.845rem;transition:color 0.3s;" onmouseover="this.style.color='var(--gold-light)'" onmouseout="this.style.color='rgba(245,240,232,0.55)'">AI备课工具</a>
    </div>
  </div>
</nav>

<!-- ===== 登录/注册主体 ===== -->
<div class="auth-page">
  <!-- 背景装饰字 -->
  <div style="position:absolute;font-family:var(--font-serif);font-size:28rem;color:var(--gold);opacity:0.025;user-select:none;pointer-events:none;right:-5%;top:50%;transform:translateY(-50%);z-index:0;line-height:1;">史</div>

  <div class="auth-card">
    <!-- 头部 -->
    <div class="auth-header">
      <div class="auth-logo">智</div>
      <div class="auth-title">欢迎使用智育云</div>
      <div class="auth-subtitle">中学历史教学一站式数字化工具</div>
    </div>

    <!-- Tab 切换 -->
    <div class="auth-tabs">
      <button class="auth-tab active" data-tab="login">登录</button>
      <button class="auth-tab" data-tab="register">免费注册</button>
    </div>

    <!-- 登录表单 -->
    <div id="loginForm">
      <div class="form-group">
        <label class="form-label">账号</label>
        <input type="text" id="loginUsername" class="form-input" placeholder="请输入账号">
      </div>
      <div class="form-group">
        <label class="form-label">密码</label>
        <input type="password" id="loginPassword" class="form-input" placeholder="请输入密码">
      </div>
      <div id="loginError" style="color:#c0392b;font-size:0.82rem;margin-bottom:10px;display:none;">账号或密码不能为空</div>
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:20px;">
        <input type="checkbox" id="remember" style="accent-color:var(--primary);">
        <label for="remember" style="font-size:0.82rem;color:var(--text-medium);cursor:pointer;">记住登录状态</label>
      </div>
      <button class="form-submit" id="loginBtn">登录</button>
      <p style="text-align:center;font-size:0.82rem;color:var(--text-light);margin-top:20px;">
        还没有账号？<a href="#" onclick="document.querySelectorAll('.auth-tab')[1].click();return false;" style="color:var(--primary);font-weight:500;">免费注册</a>
      </p>
    </div>

    <!-- 注册表单 -->
    <div id="registerForm" style="display:none;">
      <div class="form-group">
        <label class="form-label">账号</label>
        <input type="text" id="regUsername" class="form-input" placeholder="请设置账号（字母/数字，4-20位）">
      </div>
      <div class="form-group">
        <label class="form-label">姓名</label>
        <input type="text" id="regName" class="form-input" placeholder="请输入您的姓名">
      </div>
      <div class="form-group">
        <label class="form-label">密码</label>
        <input type="password" id="regPassword" class="form-input" placeholder="请设置密码（6位以上）">
      </div>
      <div class="form-group">
        <label class="form-label">确认密码</label>
        <input type="password" id="regPassword2" class="form-input" placeholder="请再次输入密码">
      </div>
      <div id="regError" style="color:#c0392b;font-size:0.82rem;margin-bottom:10px;display:none;"></div>
      <button class="form-submit" id="regBtn">注册</button>
      <p style="text-align:center;font-size:0.82rem;color:var(--text-light);margin-top:20px;">
        已有账号？<a href="#" onclick="document.querySelectorAll('.auth-tab')[0].click();return false;" style="color:var(--primary);font-weight:500;">立即登录</a>
      </p>
    </div>
  </div>
</div>

<!-- ===== 简化页脚 ===== -->
<div style="background:var(--bg-nav);border-top:1px solid rgba(201,151,58,0.1);padding:20px 0;text-align:center;">
  <div style="color:rgba(245,240,232,0.28);font-size:0.78rem;">
    © <span id="currentYear">2024</span> 智育云. 保留所有权利. &nbsp;|&nbsp; 陕ICP备XXXXXXXX号
  </div>
</div>

<script src="js/app.js"></script>
</body>
</html>
